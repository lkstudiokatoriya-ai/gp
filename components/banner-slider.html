<section id="bannerSlider" class="banner-slider">

    <div class="slider-container">

        <!-- Slides -->

        <div class="slider-wrapper">

            <div class="slide active">

                <img src="/assets/banners/polytechnic.png"
                     alt="Polytechnic Hub Banner">

            </div>

            <div class="slide">

                <img src="/assets/banners/bihar.png"
                     alt="Bihar Polytechnic Banner">

            </div>

        </div>

        <!-- Previous -->

        <button id="prevSlide"
                class="slider-btn prev-btn"
                aria-label="Previous Slide">

            ❮

        </button>

        <!-- Next -->

        <button id="nextSlide"
                class="slider-btn next-btn"
                aria-label="Next Slide">

            ❯

        </button>

        <!-- Indicators -->

        <div class="slider-indicators">

            <button class="indicator active"></button>

            <button class="indicator"></button>

        </div>

    </div>

</section>
