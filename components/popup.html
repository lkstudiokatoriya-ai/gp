<div id="popupContainer"
     class="popup-container">

    <!-- Overlay -->

    <div id="popupOverlay"
         class="popup-overlay"></div>

    <!-- Popup -->

    <div id="popupBox"
         class="popup-box">

        <!-- Close -->

        <button id="closePopup"
                class="popup-close">

            ✕

        </button>

        <!-- Image -->

        <div class="popup-image">

            <img id="popupBanner"
                 src="/assets/banners/polytechnic.png"
                 alt="Popup Banner">

        </div>

        <!-- Content -->

        <div class="popup-content">

            <h2 id="popupTitle">

                Welcome to Polytechnic Hub

            </h2>

            <p id="popupDescription">

                Explore courses, notes, PYQs, mock tests and much more.

            </p>

        </div>

        <!-- Buttons -->

        <div class="popup-actions">

            <button id="popupPrimaryButton"
                    class="popup-btn primary">

                Explore Now

            </button>

            <button id="popupSecondaryButton"
                    class="popup-btn secondary">

                Later

            </button>

        </div>

        <!-- Don't Show Again -->

        <div class="popup-footer">

            <label>

                <input type="checkbox"
                       id="dontShowPopup">

                Don't show again

            </label>

        </div>

    </div>

</div>
