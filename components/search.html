<section id="searchComponent" class="search-section">

    <div class="search-container">

        <!-- Search Box -->

        <form id="searchForm"
              class="search-form"
              autocomplete="off">

            <input type="search"
                   id="searchInput"
                   class="search-input"
                   placeholder="Search courses, notes, PYQ, books, tests..."
                   aria-label="Search">

            <button type="submit"
                    id="searchButton"
                    class="search-button">

                🔍

            </button>

            <button type="button"
                    id="clearSearchButton"
                    class="search-button">

                ✖

            </button>

        </form>

        <!-- Quick Search -->

        <div class="quick-search">

            <span>

                Popular :

            </span>

            <button class="search-tag">

                Notes

            </button>

            <button class="search-tag">

                PYQ

            </button>

            <button class="search-tag">

                VVI

            </button>

            <button class="search-tag">

                Mock Test

            </button>

            <button class="search-tag">

                Books

            </button>

            <button class="search-tag">

                Syllabus

            </button>

        </div>

        <!-- Search Suggestions -->

        <div id="searchSuggestions"
             class="search-suggestions">

        </div>

        <!-- Search Results -->

        <div id="searchResults"
             class="search-results">

        </div>

    </div>

</section>
