<header class="main-header">

    <div class="header-container">

        <!-- Left -->

        <div class="header-left">

            <button id="menuButton"
                    class="icon-button"
                    aria-label="Open Menu">

                ☰

            </button>

            <a href="/index.html"
               class="logo-area">

                <img src="assets/logo/logo.png"
                     alt="Polytechnic Hub Logo"
                     class="logo">

                <div class="logo-text">

                    <h1>

                        Polytechnic Hub

                    </h1>

                    <span>

                        Learn • Practice • Success

                    </span>

                </div>

            </a>

        </div>

        <!-- Center -->

        <div class="header-center">

            <form id="globalSearchForm">

                <input type="search"
                       id="globalSearch"
                       placeholder="Search courses, notes, PYQ, tests..."
                       autocomplete="off">

                <button type="submit">

                    🔍

                </button>

            </form>

        </div>

        <!-- Right -->

        <div class="header-right">

            <button id="notificationButton"
                    class="icon-button"
                    title="Notifications">

                🔔

                <span id="notificationCount">

                    0

                </span>

            </button>

            <button id="themeButton"
                    class="icon-button"
                    title="Dark Mode">

                🌙

            </button>

            <button id="fullscreenButton"
                    class="icon-button"
                    title="Fullscreen">

                ⛶

            </button>

            <a href="/pages/student/profile.html"
               class="profile-link">

                <img src="assets/images/default-avatar.png"
                     alt="Profile"
                     id="headerProfileImage"
                     class="profile-image">

            </a>

        </div>

    </div>

  </header>
