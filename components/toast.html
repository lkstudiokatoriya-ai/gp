<div id="toastContainer"
     class="toast-container">

    <!-- Success Toast -->

    <div id="successToast"
         class="toast toast-success">

        <div class="toast-icon">

            ✅

        </div>

        <div class="toast-content">

            <h4>

                Success

            </h4>

            <p id="successToastMessage">

                Operation completed successfully.

            </p>

        </div>

        <button class="toast-close">

            ✕

        </button>

    </div>

    <!-- Error Toast -->

    <div id="errorToast"
         class="toast toast-error">

        <div class="toast-icon">

            ❌

        </div>

        <div class="toast-content">

            <h4>

                Error

            </h4>

            <p id="errorToastMessage">

                Something went wrong.

            </p>

        </div>

        <button class="toast-close">

            ✕

        </button>

    </div>

    <!-- Warning Toast -->

    <div id="warningToast"
         class="toast toast-warning">

        <div class="toast-icon">

            ⚠️

        </div>

        <div class="toast-content">

            <h4>

                Warning

            </h4>

            <p id="warningToastMessage">

                Please check your input.

            </p>

        </div>

        <button class="toast-close">

            ✕

        </button>

    </div>

    <!-- Info Toast -->

    <div id="infoToast"
         class="toast toast-info">

        <div class="toast-icon">

            ℹ️

        </div>

        <div class="toast-content">

            <h4>

                Information

            </h4>

            <p id="infoToastMessage">

                New information available.

            </p>

        </div>

        <button class="toast-close">

            ✕

        </button>

    </div>

</div>
