<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Contact Us | Polytechnic Hub</title>

    <meta name="description"
          content="Contact Polytechnic Hub for support, business inquiries and student assistance.">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/typography.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/header.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/cards.css">
    <link rel="stylesheet" href="../../css/buttons.css">
    <link rel="stylesheet" href="../../css/forms.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <link rel="stylesheet" href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="contact-page">

        <!-- Page Header -->

        <section class="page-header">

            <div class="container">

                <h1>

                    Contact Us

                </h1>

                <p>

                    We're here to help. Contact us anytime for support, business inquiries or feedback.

                </p>

            </div>

        </section>

        <!-- Contact Information -->

        <section class="contact-information">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Contact Information

                    </h2>

                </div>

                <div id="contactInfoContainer">

                    <div class="contact-card">

                        <h3>Email</h3>
                        <p id="supportEmail">support.polytechnichub@gmail.com</p>

                    </div>

                    <div class="contact-card">

                        <h3>Phone</h3>
                        <p id="supportPhone">+91 9296783086</p>

                    </div>

                    <div class="contact-card">

                        <h3>WhatsApp</h3>
                        <p id="whatsappNumber">+91 9296783086</p>

                    </div>

                    <div class="contact-card">

                        <h3>Telegram</h3>
                        <p id="telegramLink">@PolytechnicHub</p>

                    </div>

                </div>

            </div>

        </section>

        <!-- Contact Form -->

        <section class="contact-form">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Send a Message

                    </h2>

                </div>

                <form id="contactForm">

                    <input type="text"
                           id="fullName"
                           name="fullName"
                           placeholder="Full Name"
                           required>

                    <input type="email"
                           id="email"
                           name="email"
                           placeholder="Email Address"
                           required>

                    <input type="tel"
                           id="mobile"
                           name="mobile"
                           placeholder="Mobile Number"
                           required>

                    <input type="text"
                           id="subject"
                           name="subject"
                           placeholder="Subject"
                           required>

                    <textarea id="message"
                              name="message"
                              rows="6"
                              placeholder="Write your message..."
                              required></textarea>

                    <button type="submit">

                        Send Message

                    </button>

                </form>

            </div>

        </section>

        <!-- Social Media -->

        <section class="social-media">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Follow Us

                    </h2>

                </div>

                <div id="socialMediaContainer">

                    <!-- Facebook -->
                    <!-- Instagram -->
                    <!-- YouTube -->
                    <!-- Telegram -->
                    <!-- WhatsApp -->
                    <!-- Website -->

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/contact.js"></script>
    <script src="../../js/app.js"></script>

</body>

                                                             </html>
