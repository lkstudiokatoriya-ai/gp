<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Report a Problem | Polytechnic Hub</title>

    <meta name="description"
          content="Report bugs, technical issues or inappropriate content to Polytechnic Hub.">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/typography.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/header.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/cards.css">
    <link rel="stylesheet" href="../../css/buttons.css">
    <link rel="stylesheet" href="../../css/forms.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <link rel="stylesheet" href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="report-page">

        <!-- Page Header -->

        <section class="page-header">

            <div class="container">

                <h1>

                    Report a Problem

                </h1>

                <p>

                    Report bugs, payment issues, technical errors or inappropriate content.

                </p>

            </div>

        </section>

        <!-- Report Form -->

        <section class="report-form-section">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Submit Report

                    </h2>

                </div>

                <form id="reportForm">

                    <div class="form-group">

                        <label for="reportType">

                            Report Type

                        </label>

                        <select id="reportType"
                                name="reportType"
                                required>

                            <option value="">Select Report Type</option>
                            <option value="bug">Bug</option>
                            <option value="payment">Payment Issue</option>
                            <option value="login">Login Problem</option>
                            <option value="course">Course Issue</option>
                            <option value="download">Download Problem</option>
                            <option value="content">Inappropriate Content</option>
                            <option value="other">Other</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label for="reportSubject">

                            Subject

                        </label>

                        <input type="text"
                               id="reportSubject"
                               name="reportSubject"
                               placeholder="Enter Subject"
                               required>

                    </div>

                    <div class="form-group">

                        <label for="reportDescription">

                            Description

                        </label>

                        <textarea id="reportDescription"
                                  name="reportDescription"
                                  rows="6"
                                  placeholder="Describe your issue..."
                                  required></textarea>

                    </div>

                    <div class="form-group">

                        <label for="reportAttachment">

                            Screenshot / File (Optional)

                        </label>

                        <input type="file"
                               id="reportAttachment"
                               accept="image/*,.pdf,.zip">

                    </div>

                    <button type="submit"
                            id="submitReportButton">

                        Submit Report

                    </button>

                </form>

            </div>

        </section>

        <!-- Report Status -->

        <section class="report-status">

            <div class="container">

                <div class="section-title">

                    <h2>

                        My Reports

                    </h2>

                </div>

                <div id="reportStatusContainer">

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/report.js"></script>
    <script src="../../js/app.js"></script>

</body>

</html>
