<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Recorded Classes | Polytechnic Hub</title>

    <meta name="description"
          content="Watch recorded classes anytime on Polytechnic Hub">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../css/reset.css">

    <link rel="stylesheet"
          href="../../css/variables.css">

    <link rel="stylesheet"
          href="../../css/typography.css">

    <link rel="stylesheet"
          href="../../css/layout.css">

    <link rel="stylesheet"
          href="../../css/header.css">

    <link rel="stylesheet"
          href="../../css/sidebar.css">

    <link rel="stylesheet"
          href="../../css/cards.css">

    <link rel="stylesheet"
          href="../../css/buttons.css">

    <link rel="stylesheet"
          href="../../css/banner.css">

    <link rel="stylesheet"
          href="../../css/responsive.css">

    <link rel="stylesheet"
          href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="recorded-classes-page">

        <section class="page-header">

            <div class="container">

                <h1>

                    Recorded Classes

                </h1>

                <p>

                    Watch recorded lectures anytime and continue your learning at your own pace.

                </p>

            </div>

        </section>

        <!-- Search -->

        <section class="recorded-search">

            <div class="container">

                <input type="search"
                       id="recordedClassSearch"
                       placeholder="Search recorded classes...">

            </div>

        </section>

        <!-- Continue Watching -->

        <section class="continue-watching">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Continue Watching

                    </h2>

                </div>

                <div id="continueWatchingContainer">

                </div>

            </div>

        </section>

        <!-- Recently Added -->

        <section class="recent-recorded-classes">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Recently Added

                    </h2>

                </div>

                <div id="recentRecordedContainer">

                </div>

            </div>

        </section>

        <!-- Popular Recorded Classes -->

        <section class="popular-recorded-classes">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Most Watched

                    </h2>

                </div>

                <div id="popularRecordedContainer">

                </div>

            </div>

        </section>

        <!-- All Recorded Classes -->

        <section class="all-recorded-classes">

            <div class="container">

                <div class="section-title">

                    <h2>

                        All Recorded Classes

                    </h2>

                </div>

                <div id="recordedClassContainer">

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/courses.js"></script>
    <script src="../../js/search.js"></script>
    <script src="../../js/app.js"></script>

</body>

  </html>
