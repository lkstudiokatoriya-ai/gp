<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Free Courses | Polytechnic Hub</title>

    <meta name="description"
          content="Access free courses, demo classes and learning resources on Polytechnic Hub">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../css/reset.css">

    <link rel="stylesheet"
          href="../../css/variables.css">

    <link rel="stylesheet"
          href="../../css/typography.css">

    <link rel="stylesheet"
          href="../../css/layout.css">

    <link rel="stylesheet"
          href="../../css/header.css">

    <link rel="stylesheet"
          href="../../css/sidebar.css">

    <link rel="stylesheet"
          href="../../css/cards.css">

    <link rel="stylesheet"
          href="../../css/buttons.css">

    <link rel="stylesheet"
          href="../../css/banner.css">

    <link rel="stylesheet"
          href="../../css/responsive.css">

    <link rel="stylesheet"
          href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="free-courses-page">

        <section class="page-header">

            <div class="container">

                <h1>

                    Free Courses

                </h1>

                <p>

                    Learn with free demo classes, notes, videos and practice materials.

                </p>

            </div>

        </section>

        <!-- Search -->

        <section class="course-search">

            <div class="container">

                <input type="search"
                       id="freeCourseSearch"
                       placeholder="Search free courses...">

            </div>

        </section>

        <!-- Categories -->

        <section class="course-categories">

            <div class="container">

                <div id="freeCategoryContainer">

                </div>

            </div>

        </section>

        <!-- Featured Free Courses -->

        <section class="featured-free-courses">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Featured Free Courses

                    </h2>

                </div>

                <div id="featuredFreeCourseContainer">

                </div>

            </div>

        </section>

        <!-- All Free Courses -->

        <section class="all-free-courses">

            <div class="container">

                <div class="section-title">

                    <h2>

                        All Free Courses

                    </h2>

                </div>

                <div id="freeCourseContainer">

                </div>

            </div>

        </section>

        <!-- Recommended -->

        <section class="recommended-courses">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Recommended For You

                    </h2>

                </div>

                <div id="recommendedCourseContainer">

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/courses.js"></script>
    <script src="../../js/search.js"></script>
    <script src="../../js/app.js"></script>

</body>

      </html>
