<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Course Details | Polytechnic Hub</title>

    <meta name="description"
          content="Course Details - Polytechnic Hub">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../css/reset.css">

    <link rel="stylesheet"
          href="../../css/variables.css">

    <link rel="stylesheet"
          href="../../css/typography.css">

    <link rel="stylesheet"
          href="../../css/layout.css">

    <link rel="stylesheet"
          href="../../css/header.css">

    <link rel="stylesheet"
          href="../../css/sidebar.css">

    <link rel="stylesheet"
          href="../../css/cards.css">

    <link rel="stylesheet"
          href="../../css/buttons.css">

    <link rel="stylesheet"
          href="../../css/banner.css">

    <link rel="stylesheet"
          href="../../css/forms.css">

    <link rel="stylesheet"
          href="../../css/responsive.css">

    <link rel="stylesheet"
          href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="course-details-page">

        <!-- Course Banner -->

        <section class="course-banner">

            <div class="container">

                <img id="courseBanner"
                     src="../../assets/images/course-placeholder.jpg"
                     alt="Course Banner">

            </div>

        </section>

        <!-- Course Information -->

        <section class="course-information">

            <div class="container">

                <h1 id="courseTitle">

                    Course Title

                </h1>

                <p id="courseDescription">

                    Course description will appear here.

                </p>

                <div class="course-meta">

                    <span id="courseInstructor">

                        Instructor

                    </span>

                    <span id="courseLanguage">

                        Hindi

                    </span>

                    <span id="courseDuration">

                        00 Hours

                    </span>

                    <span id="courseLevel">

                        Beginner

                    </span>

                </div>

            </div>

        </section>

        <!-- Pricing -->

        <section class="course-pricing">

            <div class="container">

                <h2 id="coursePrice">

                    ₹0

                </h2>

                <button id="buyCourseButton">

                    Buy Now

                </button>

                <button id="demoCourseButton">

                    Watch Demo

                </button>

            </div>

        </section>

        <!-- Course Curriculum -->

        <section class="course-curriculum">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Course Curriculum

                    </h2>

                </div>

                <div id="curriculumContainer">

                </div>

            </div>

        </section>

        <!-- What You Will Learn -->

        <section class="learning-outcomes">

            <div class="container">

                <div class="section-title">

                    <h2>

                        What You Will Learn

                    </h2>

                </div>

                <div id="learningContainer">

                </div>

            </div>

        </section>

        <!-- Course Features -->

        <section class="course-features">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Course Features

                    </h2>

                </div>

                <ul id="featureContainer">

                </ul>

            </div>

        </section>

        <!-- Requirements -->

        <section class="course-requirements">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Requirements

                    </h2>

                </div>

                <ul id="requirementContainer">

                </ul>

            </div>

        </section>

        <!-- Reviews -->

        <section class="course-reviews">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Student Reviews

                    </h2>

                </div>

                <div id="reviewContainer">

                </div>

            </div>

        </section>

        <!-- Related Courses -->

        <section class="related-courses">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Related Courses

                    </h2>

                </div>

                <div id="relatedCourseContainer">

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/courses.js"></script>
    <script src="../../js/payment.js"></script>
    <script src="../../js/reviews.js"></script>
    <script src="../../js/app.js"></script>

</body>

                      </html>
