<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Live Classes | Polytechnic Hub</title>

    <meta name="description"
          content="Attend live classes and interactive sessions on Polytechnic Hub">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../css/reset.css">

    <link rel="stylesheet"
          href="../../css/variables.css">

    <link rel="stylesheet"
          href="../../css/typography.css">

    <link rel="stylesheet"
          href="../../css/layout.css">

    <link rel="stylesheet"
          href="../../css/header.css">

    <link rel="stylesheet"
          href="../../css/sidebar.css">

    <link rel="stylesheet"
          href="../../css/cards.css">

    <link rel="stylesheet"
          href="../../css/buttons.css">

    <link rel="stylesheet"
          href="../../css/banner.css">

    <link rel="stylesheet"
          href="../../css/responsive.css">

    <link rel="stylesheet"
          href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="live-classes-page">

        <section class="page-header">

            <div class="container">

                <h1>

                    Live Classes

                </h1>

                <p>

                    Join live interactive classes, ask questions and learn with expert teachers.

                </p>

            </div>

        </section>

        <!-- Search -->

        <section class="live-search">

            <div class="container">

                <input type="search"
                       id="liveClassSearch"
                       placeholder="Search live classes...">

            </div>

        </section>

        <!-- Today's Live Classes -->

        <section class="today-live-classes">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Today's Live Classes

                    </h2>

                </div>

                <div id="todayLiveClassContainer">

                </div>

            </div>

        </section>

        <!-- Upcoming Live Classes -->

        <section class="upcoming-live-classes">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Upcoming Live Classes

                    </h2>

                </div>

                <div id="upcomingLiveClassContainer">

                </div>

            </div>

        </section>

        <!-- Ongoing Live Classes -->

        <section class="ongoing-live-classes">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Live Now

                    </h2>

                </div>

                <div id="ongoingLiveClassContainer">

                </div>

            </div>

        </section>

        <!-- Previous Live Sessions -->

        <section class="previous-live-classes">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Previous Live Sessions

                    </h2>

                </div>

                <div id="previousLiveClassContainer">

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/courses.js"></script>
    <script src="../../js/search.js"></script>
    <script src="../../js/app.js"></script>

</body>

              </html>
