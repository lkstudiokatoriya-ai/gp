<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Notice Board | Polytechnic Hub</title>

    <meta name="description"
          content="Latest Notices, Announcements and Updates">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/typography.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/header.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/cards.css">
    <link rel="stylesheet" href="../../css/buttons.css">
    <link rel="stylesheet" href="../../css/forms.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <link rel="stylesheet" href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="notice-board-page">

        <!-- Page Header -->

        <section class="page-header">

            <div class="container">

                <h1>

                    Notice Board

                </h1>

                <p>

                    Stay updated with the latest announcements, exam notices and important information.

                </p>

            </div>

        </section>

        <!-- Search -->

        <section class="notice-search">

            <div class="container">

                <input type="search"
                       id="noticeSearch"
                       placeholder="Search Notices...">

            </div>

        </section>

        <!-- Important Notices -->

        <section class="important-notices">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Important Notices

                    </h2>

                </div>

                <div id="importantNoticeContainer">

                </div>

            </div>

        </section>

        <!-- Latest Notices -->

        <section class="latest-notices">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Latest Notices

                    </h2>

                </div>

                <div id="latestNoticeContainer">

                </div>

            </div>

        </section>

        <!-- Academic Notices -->

        <section class="academic-notices">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Academic Notices

                    </h2>

                </div>

                <div id="academicNoticeContainer">

                </div>

            </div>

        </section>

        <!-- Examination Notices -->

        <section class="exam-notices">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Examination Notices

                    </h2>

                </div>

                <div id="examNoticeContainer">

                </div>

            </div>

        </section>

        <!-- Archived Notices -->

        <section class="archive-notices">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Archived Notices

                    </h2>

                </div>

                <div id="archiveNoticeContainer">

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/search.js"></script>
    <script src="../../js/notices.js"></script>
    <script src="../../js/app.js"></script>

</body>

  </html>
