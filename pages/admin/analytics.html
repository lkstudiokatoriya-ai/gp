<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Analytics Dashboard | Polytechnic Hub Admin</title>

    <meta name="description"
          content="Analytics dashboard for Polytechnic Hub">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/typography.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/cards.css">
    <link rel="stylesheet" href="../../css/forms.css">
    <link rel="stylesheet" href="../../css/buttons.css">
    <link rel="stylesheet" href="../../css/tables.css">
    <link rel="stylesheet" href="../../css/charts.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <link rel="stylesheet" href="../../css/style.css">

</head>

<body>

    <main id="admin-analytics-page">

        <!-- Page Header -->

        <section class="page-header">

            <div class="container">

                <h1>

                    Analytics Dashboard

                </h1>

                <p>

                    View detailed reports, traffic, users and platform performance.

                </p>

            </div>

        </section>

        <!-- Overview Cards -->

        <section class="analytics-overview">

            <div class="container">

                <div class="stats-grid">

                    <div class="stat-card">
                        <h2 id="totalVisitors">0</h2>
                        <p>Total Visitors</p>
                    </div>

                    <div class="stat-card">
                        <h2 id="todayVisitors">0</h2>
                        <p>Today's Visitors</p>
                    </div>

                    <div class="stat-card">
                        <h2 id="registeredUsers">0</h2>
                        <p>Registered Users</p>
                    </div>

                    <div class="stat-card">
                        <h2 id="activeUsers">0</h2>
                        <p>Active Users</p>
                    </div>

                    <div class="stat-card">
                        <h2 id="courseViews">0</h2>
                        <p>Course Views</p>
                    </div>

                    <div class="stat-card">
                        <h2 id="videoWatchTime">0 hrs</h2>
                        <p>Watch Time</p>
                    </div>

                    <div class="stat-card">
                        <h2 id="downloads">0</h2>
                        <p>Downloads</p>
                    </div>

                    <div class="stat-card">
                        <h2 id="revenue">₹0</h2>
                        <p>Total Revenue</p>
                    </div>

                </div>

            </div>

        </section>

        <!-- Charts -->

        <section class="analytics-charts">

            <div class="container">

                <h2>

                    Analytics Charts

                </h2>

                <div id="visitorChart"></div>

                <div id="revenueChart"></div>

                <div id="courseChart"></div>

                <div id="trafficChart"></div>

            </div>

        </section>

        <!-- Reports -->

        <section class="analytics-reports">

            <div class="container">

                <h2>

                    Reports

                </h2>

                <div id="analyticsReportContainer">

                </div>

            </div>

        </section>

        <!-- Export -->

        <section class="analytics-actions">

            <div class="container">

                <button id="exportPDFButton">

                    Export PDF

                </button>

                <button id="exportExcelButton">

                    Export Excel

                </button>

                <button id="refreshAnalyticsButton">

                    Refresh Data

                </button>

            </div>

        </section>

    </main>

    <script src="../../js/admin-analytics.js"></script>
    <script src="../../js/app.js"></script>

</body>

          </html>
