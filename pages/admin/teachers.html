<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Manage Teachers | Polytechnic Hub Admin</title>

    <meta name="description"
          content="Admin panel to manage teachers and instructors">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/typography.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/cards.css">
    <link rel="stylesheet" href="../../css/forms.css">
    <link rel="stylesheet" href="../../css/buttons.css">
    <link rel="stylesheet" href="../../css/tables.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <link rel="stylesheet" href="../../css/style.css">

</head>

<body>

    <main id="admin-teachers-page">

        <!-- Page Header -->

        <section class="page-header">

            <div class="container">

                <h1>

                    Manage Teachers

                </h1>

                <p>

                    Add, edit and manage teachers, instructors and faculty members.

                </p>

            </div>

        </section>

        <!-- Statistics -->

        <section class="teacher-statistics">

            <div class="container">

                <div class="stats-grid">

                    <div class="stat-card">
                        <h2 id="totalTeachers">0</h2>
                        <p>Total Teachers</p>
                    </div>

                    <div class="stat-card">
                        <h2 id="activeTeachers">0</h2>
                        <p>Active Teachers</p>
                    </div>

                    <div class="stat-card">
                        <h2 id="liveTeachers">0</h2>
                        <p>Live Classes</p>
                    </div>

                    <div class="stat-card">
                        <h2 id="verifiedTeachers">0</h2>
                        <p>Verified</p>
                    </div>

                </div>

            </div>

        </section>

        <!-- Search -->

        <section class="teacher-search">

            <div class="container">

                <input type="search"
                       id="teacherSearch"
                       placeholder="Search Teacher">

            </div>

        </section>

        <!-- Teacher List -->

        <section class="teacher-list">

            <div class="container">

                <h2>

                    All Teachers

                </h2>

                <div id="teacherTableContainer">

                </div>

            </div>

        </section>

        <!-- Add Teacher -->

        <section class="teacher-actions">

            <div class="container">

                <button id="addTeacherButton">

                    Add Teacher

                </button>

                <button id="importTeacherButton">

                    Import Teachers

                </button>

                <button id="exportTeacherButton">

                    Export Teachers

                </button>

            </div>

        </section>

    </main>

    <script src="../../js/admin-teachers.js"></script>
    <script src="../../js/app.js"></script>

</body>

</html>
