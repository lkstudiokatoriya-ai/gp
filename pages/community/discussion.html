<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Discussion Forum | Polytechnic Hub</title>

    <meta name="description"
          content="Ask questions, discuss topics and help other Polytechnic students.">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/typography.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/header.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/cards.css">
    <link rel="stylesheet" href="../../css/buttons.css">
    <link rel="stylesheet" href="../../css/forms.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <link rel="stylesheet" href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="discussion-page">

        <!-- Page Header -->

        <section class="page-header">

            <div class="container">

                <h1>

                    Discussion Forum

                </h1>

                <p>

                    Ask questions, answer others and learn together.

                </p>

            </div>

        </section>

        <!-- Create Post -->

        <section class="create-post">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Start a Discussion

                    </h2>

                </div>

                <form id="discussionForm">

                    <input type="text"
                           id="discussionTitle"
                           placeholder="Discussion Title">

                    <textarea id="discussionMessage"
                              rows="5"
                              placeholder="Write your question or discussion..."></textarea>

                    <button type="submit">

                        Post Discussion

                    </button>

                </form>

            </div>

        </section>

        <!-- Categories -->

        <section class="discussion-categories">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Categories

                    </h2>

                </div>

                <div id="categoryContainer">

                </div>

            </div>

        </section>

        <!-- Trending -->

        <section class="trending-discussions">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Trending Discussions

                    </h2>

                </div>

                <div id="trendingDiscussionContainer">

                </div>

            </div>

        </section>

        <!-- Latest -->

        <section class="latest-discussions">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Latest Discussions

                    </h2>

                </div>

                <div id="latestDiscussionContainer">

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/community.js"></script>
    <script src="../../js/app.js"></script>

</body>

</html>
