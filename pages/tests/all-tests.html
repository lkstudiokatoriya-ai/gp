<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>All Tests | Polytechnic Hub</title>

    <meta name="description"
          content="Practice with online tests and mock exams on Polytechnic Hub">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../css/reset.css">

    <link rel="stylesheet"
          href="../../css/variables.css">

    <link rel="stylesheet"
          href="../../css/typography.css">

    <link rel="stylesheet"

    <link rel="stylesheet"

    <link rel="stylesheet"

    <link rel="stylesheet"

    <link rel="stylesheet"

    <link rel="stylesheet"
          href="../../css/responsive.css">

    <link rel="stylesheet"

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="all-tests-page">

        <!-- Page Header -->

        <section class="page-header">

            <div class="container">

                <h1>

                    All Tests

                </h1>

                <p>

                    Practice with chapter-wise, subject-wise and full mock tests.

                </p>

            </div>

        </section>

        <!-- Search -->

        <section class="test-search">

            <div class="container">

                <input type="search"
                       id="testSearch"
                       placeholder="Search tests...">

            </div>

        </section>

        <!-- Categories -->

        <section class="test-categories">

            <div class="container">

                <div id="testCategoryContainer">

                </div>

            </div>

        </section>

        <!-- Featured Tests -->

        <section class="featured-tests">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Featured Tests

                    </h2>

                </div>

                <div id="featuredTestContainer">

                </div>

            </div>

        </section>

        <!-- All Tests -->

        <section class="all-tests">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Available Tests

                    </h2>

                </div>

                <div id="allTestContainer">

                </div>

            </div>

        </section>

        <!-- Recent Tests -->

        <section class="recent-tests">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Recently Added

                    </h2>

                </div>

                <div id="recentTestContainer">

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/tests.js"></script>
    <script src="../../js/search.js"></script>
    <script src="../../js/app.js"></script>
