<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Answer Review | Polytechnic Hub</title>

    <meta name="description"
          content="Review your answers, correct solutions and explanations.">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../css/reset.css">

    <link rel="stylesheet"
          href="../../css/variables.css">

    <link rel="stylesheet"
          href="../../css/typography.css">

    <link rel="stylesheet"
          href="../../css/layout.css">

    <link rel="stylesheet"
          href="../../css/header.css">

    <link rel="stylesheet"
          href="../../css/sidebar.css">

    <link rel="stylesheet"
          href="../../css/cards.css">

    <link rel="stylesheet"
          href="../../css/buttons.css">

    <link rel="stylesheet"
          href="../../css/forms.css">

    <link rel="stylesheet"
          href="../../css/responsive.css">

    <link rel="stylesheet"
          href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="review-page">

        <!-- Page Header -->

        <section class="page-header">

            <div class="container">

                <h1>

                    Answer Review

                </h1>

                <p>

                    Review your answers with correct solutions and explanations.

                </p>

            </div>

        </section>

        <!-- Test Information -->

        <section class="test-information">

            <div class="container">

                <div class="info-card">

                    <h2 id="testTitle">

                        Test Title

                    </h2>

                    <p id="testSubject">

                        Subject

                    </p>

                    <p id="testMarks">

                        Total Marks : 0

                    </p>

                    <p id="testScore">

                        Your Score : 0

                    </p>

                </div>

            </div>

        </section>

        <!-- Review Summary -->

        <section class="review-summary">

            <div class="container">

                <div class="summary-card">

                    <div class="summary-item">

                        <h3 id="correctAnswers">

                            0

                        </h3>

                        <p>

                            Correct

                        </p>

                    </div>

                    <div class="summary-item">

                        <h3 id="wrongAnswers">

                            0

                        </h3>

                        <p>

                            Wrong

                        </p>

                    </div>

                    <div class="summary-item">

                        <h3 id="unattemptedQuestions">

                            0

                        </h3>

                        <p>

                            Unattempted

                        </p>

                    </div>

                    <div class="summary-item">

                        <h3 id="accuracy">

                            0%

                        </h3>

                        <p>

                            Accuracy

                        </p>

                    </div>

                </div>

            </div>

        </section>

        <!-- Question Review -->

        <section class="question-review">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Question Review

                    </h2>

                </div>

                <div id="questionReviewContainer">

                </div>

            </div>

        </section>

        <!-- Explanation -->

        <section class="solution-section">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Detailed Solutions

                    </h2>

                </div>

                <div id="solutionContainer">

                </div>

            </div>

        </section>

        <!-- Navigation -->

        <section class="review-actions">

            <div class="container">

                <button id="previousQuestionButton">

                    Previous

                </button>

                <button id="nextQuestionButton">

                    Next

                </button>

                <button id="finishReviewButton">

                    Finish Review

                </button>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/tests.js"></script>
    <script src="../../js/review.js"></script>
    <script src="../../js/app.js"></script>

</body>

</html>
