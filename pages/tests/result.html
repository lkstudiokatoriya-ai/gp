<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Test Result | Polytechnic Hub</title>

    <meta name="description"
          content="View your test result and performance analysis on Polytechnic Hub">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../css/reset.css">

    <link rel="stylesheet"
          href="../../css/variables.css">

    <link rel="stylesheet"
          href="../../css/typography.css">

    <link rel="stylesheet"
          href="../../css/layout.css">

    <link rel="stylesheet"
          href="../../css/header.css">

    <link rel="stylesheet"
          href="../../css/sidebar.css">

    <link rel="stylesheet"
          href="../../css/cards.css">

    <link rel="stylesheet"
          href="../../css/buttons.css">

    <link rel="stylesheet"
          href="../../css/forms.css">

    <link rel="stylesheet"
          href="../../css/responsive.css">

    <link rel="stylesheet"
          href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="test-result-page">

        <!-- Page Header -->

        <section class="page-header">

            <div class="container">

                <h1>

                    Test Result

                </h1>

                <p>

                    View your score, rank and detailed performance.

                </p>

            </div>

        </section>

        <!-- Result Summary -->

        <section class="result-summary">

            <div class="container">

                <div class="summary-card">

                    <div class="summary-item">

                        <h3 id="totalScore">

                            0

                        </h3>

                        <p>

                            Total Score

                        </p>

                    </div>

                    <div class="summary-item">

                        <h3 id="percentage">

                            0%

                        </h3>

                        <p>

                            Percentage

                        </p>

                    </div>

                    <div class="summary-item">

                        <h3 id="studentRank">

                            -

                        </h3>

                        <p>

                            Rank

                        </p>

                    </div>

                    <div class="summary-item">

                        <h3 id="resultStatus">

                            Pending

                        </h3>

                        <p>

                            Status

                        </p>

                    </div>

                </div>

            </div>

        </section>

        <!-- Performance -->

        <section class="performance-analysis">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Performance Analysis

                    </h2>

                </div>

                <div id="performanceContainer">

                </div>

            </div>

        </section>

        <!-- Subject-wise Result -->

        <section class="subject-result">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Subject-wise Performance

                    </h2>

                </div>

                <div id="subjectResultContainer">

                </div>

            </div>

        </section>

        <!-- Answer Review -->

        <section class="answer-review">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Answer Review

                    </h2>

                </div>

                <div id="answerReviewContainer">

                </div>

            </div>

        </section>

        <!-- Action Buttons -->

        <section class="result-actions">

            <div class="container">

                <button id="downloadResultButton">

                    Download Result

                </button>

                <button id="shareResultButton">

                    Share Result

                </button>

                <button id="retryTestButton">

                    Retry Test

                </button>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/tests.js"></script>
    <script src="../../js/results.js"></script>
    <script src="../../js/app.js"></script>

</body>

</html>
