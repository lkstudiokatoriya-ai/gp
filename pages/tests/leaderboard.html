<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Leaderboard | Polytechnic Hub</title>

    <meta name="description"
          content="View rankings, toppers and leaderboard for Polytechnic Hub online tests">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../css/reset.css">

    <link rel="stylesheet"
          href="../../css/variables.css">

    <link rel="stylesheet"
          href="../../css/typography.css">

    <link rel="stylesheet"
          href="../../css/layout.css">

    <link rel="stylesheet"
          href="../../css/header.css">

    <link rel="stylesheet"
          href="../../css/sidebar.css">

    <link rel="stylesheet"
          href="../../css/cards.css">

    <link rel="stylesheet"
          href="../../css/buttons.css">

    <link rel="stylesheet"
          href="../../css/tables.css">

    <link rel="stylesheet"
          href="../../css/responsive.css">

    <link rel="stylesheet"
          href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="leaderboard-page">

        <!-- Page Header -->

        <section class="page-header">

            <div class="container">

                <h1>

                    Leaderboard

                </h1>

                <p>

                    Check rankings, top performers and compare your performance.

                </p>

            </div>

        </section>

        <!-- Top Statistics -->

        <section class="leaderboard-summary">

            <div class="container">

                <div class="summary-card">

                    <div class="summary-item">

                        <h3 id="yourRank">

                            -

                        </h3>

                        <p>

                            Your Rank

                        </p>

                    </div>

                    <div class="summary-item">

                        <h3 id="yourScore">

                            0

                        </h3>

                        <p>

                            Your Score

                        </p>

                    </div>

                    <div class="summary-item">

                        <h3 id="totalParticipants">

                            0

                        </h3>

                        <p>

                            Participants

                        </p>

                    </div>

                    <div class="summary-item">

                        <h3 id="highestScore">

                            0

                        </h3>

                        <p>

                            Highest Score

                        </p>

                    </div>

                </div>

            </div>

        </section>

        <!-- Filter -->

        <section class="leaderboard-filter">

            <div class="container">

                <select id="leaderboardFilter">

                    <option value="overall">

                        Overall

                    </option>

                    <option value="daily">

                        Daily

                    </option>

                    <option value="weekly">

                        Weekly

                    </option>

                    <option value="monthly">

                        Monthly

                    </option>

                    <option value="subject">

                        Subject Wise

                    </option>

                </select>

            </div>

        </section>

        <!-- Top 3 -->

        <section class="top-performers">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Top Performers

                    </h2>

                </div>

                <div id="topPerformerContainer">

                </div>

            </div>

        </section>

        <!-- Leaderboard Table -->

        <section class="leaderboard-list">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Rankings

                    </h2>

                </div>

                <div id="leaderboardTableContainer">

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/tests.js"></script>
    <script src="../../js/leaderboard.js"></script>
    <script src="../../js/app.js"></script>

</body>

</html>
