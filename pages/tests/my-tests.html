<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Tests | Polytechnic Hub</title>

    <meta name="description"
          content="View your purchased, attempted and upcoming tests on Polytechnic Hub">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../css/reset.css">

    <link rel="stylesheet"
          href="../../css/variables.css">

    <link rel="stylesheet"
          href="../../css/typography.css">

    <link rel="stylesheet"
          href="../../css/layout.css">

    <link rel="stylesheet"
          href="../../css/header.css">

    <link rel="stylesheet"
          href="../../css/sidebar.css">

    <link rel="stylesheet"
          href="../../css/cards.css">

    <link rel="stylesheet"
          href="../../css/buttons.css">

    <link rel="stylesheet"
          href="../../css/forms.css">

    <link rel="stylesheet"
          href="../../css/responsive.css">

    <link rel="stylesheet"
          href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="my-tests-page">

        <!-- Page Header -->

        <section class="page-header">

            <div class="container">

                <h1>

                    My Tests

                </h1>

                <p>

                    Access your purchased tests, practice history and upcoming exams.

                </p>

            </div>

        </section>

        <!-- Test Summary -->

        <section class="test-summary">

            <div class="container">

                <div class="summary-card">

                    <div class="summary-item">

                        <h3 id="purchasedTests">

                            0

                        </h3>

                        <p>

                            Purchased

                        </p>

                    </div>

                    <div class="summary-item">

                        <h3 id="completedTests">

                            0

                        </h3>

                        <p>

                            Completed

                        </p>

                    </div>

                    <div class="summary-item">

                        <h3 id="pendingTests">

                            0

                        </h3>

                        <p>

                            Pending

                        </p>

                    </div>

                    <div class="summary-item">

                        <h3 id="averageScore">

                            0%

                        </h3>

                        <p>

                            Average Score

                        </p>

                    </div>

                </div>

            </div>

        </section>

        <!-- Purchased Tests -->

        <section class="purchased-tests">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Purchased Tests

                    </h2>

                </div>

                <div id="purchasedTestContainer">

                </div>

            </div>

        </section>

        <!-- Attempt History -->

        <section class="attempt-history">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Attempt History

                    </h2>

                </div>

                <div id="attemptHistoryContainer">

                </div>

            </div>

        </section>

        <!-- Upcoming Tests -->

        <section class="upcoming-tests">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Upcoming Tests

                    </h2>

                </div>

                <div id="upcomingTestContainer">

                </div>

            </div>

        </section>

        <!-- Results -->

        <section class="test-results">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Test Results

                    </h2>

                </div>

                <div id="resultContainer">

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/tests.js"></script>
    <script src="../../js/profile.js"></script>
    <script src="../../js/app.js"></script>

</body>

      </html>
