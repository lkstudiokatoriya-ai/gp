<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Syllabus | Polytechnic Hub</title>

    <meta name="description"
          content="Semester-wise Polytechnic Syllabus">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/typography.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/header.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/cards.css">
    <link rel="stylesheet" href="../../css/buttons.css">
    <link rel="stylesheet" href="../../css/forms.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <link rel="stylesheet" href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="syllabus-page">

        <!-- Page Header -->

        <section class="page-header">

            <div class="container">

                <h1>

                    Polytechnic Syllabus

                </h1>

                <p>

                    Browse semester-wise and branch-wise syllabus.

                </p>

            </div>

        </section>

        <!-- Search -->

        <section class="syllabus-search">

            <div class="container">

                <input type="search"
                       id="syllabusSearch"
                       placeholder="Search Syllabus...">

            </div>

        </section>

        <!-- Branch -->

        <section class="branch-section">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Select Branch

                    </h2>

                </div>

                <div id="branchContainer">

                </div>

            </div>

        </section>

        <!-- Semester -->

        <section class="semester-section">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Select Semester

                    </h2>

                </div>

                <div id="semesterContainer">

                </div>

            </div>

        </section>

        <!-- Subjects -->

        <section class="subject-section">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Subjects

                    </h2>

                </div>

                <div id="subjectContainer">

                </div>

            </div>

        </section>

        <!-- Syllabus -->

        <section class="syllabus-list">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Course Syllabus

                    </h2>

                </div>

                <div id="syllabusContainer">

                </div>

            </div>

        </section>

        <!-- Downloads -->

        <section class="download-section">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Download PDF

                    </h2>

                </div>

                <div id="downloadContainer">

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/search.js"></script>
    <script src="../../js/syllabus.js"></script>
    <script src="../../js/app.js"></script>

</body>

                                    </html>
