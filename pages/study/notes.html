<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Notes | Polytechnic Hub</title>

    <meta name="description"
          content="Semester-wise, Subject-wise Notes for Polytechnic Students">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/typography.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/header.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/cards.css">
    <link rel="stylesheet" href="../../css/buttons.css">
    <link rel="stylesheet" href="../../css/forms.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <link rel="stylesheet" href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="notes-page">

        <!-- Page Header -->

        <section class="page-header">

            <div class="container">

                <h1>

                    Notes

                </h1>

                <p>

                    Study with high-quality handwritten notes, PDF notes and chapter-wise study resources.

                </p>

            </div>

        </section>

        <!-- Search -->

        <section class="notes-search">

            <div class="container">

                <input type="search"
                       id="notesSearch"
                       placeholder="Search Notes...">

            </div>

        </section>

        <!-- Semester -->

        <section class="semester-section">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Select Semester

                    </h2>

                </div>

                <div id="semesterContainer">

                </div>

            </div>

        </section>

        <!-- Subjects -->

        <section class="subject-section">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Subjects

                    </h2>

                </div>

                <div id="subjectContainer">

                </div>

            </div>

        </section>

        <!-- Premium Notes -->

        <section class="premium-notes">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Premium Notes

                    </h2>

                </div>

                <div id="premiumNotesContainer">

                </div>

            </div>

        </section>

        <!-- Free Notes -->

        <section class="free-notes">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Free Notes

                    </h2>

                </div>

                <div id="freeNotesContainer">

                </div>

            </div>

        </section>

        <!-- Recent Notes -->

        <section class="recent-notes">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Recently Added

                    </h2>

                </div>

                <div id="recentNotesContainer">

                </div>

            </div>

        </section>

        <!-- Download History -->

        <section class="download-history">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Download History

                    </h2>

                </div>

                <div id="downloadHistoryContainer">

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/search.js"></script>
    <script src="../../js/notes.js"></script>
    <script src="../../js/app.js"></script>

</body>

      </html>
