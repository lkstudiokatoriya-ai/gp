<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Study Material | Polytechnic Hub</title>

    <meta name="description"
          content="Study Materials, Notes, PDFs and Learning Resources - Polytechnic Hub">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../css/reset.css">

    <link rel="stylesheet"
          href="../../css/variables.css">

    <link rel="stylesheet"
          href="../../css/typography.css">

    <link rel="stylesheet"
          href="../../css/layout.css">

    <link rel="stylesheet"
          href="../../css/header.css">

    <link rel="stylesheet"
          href="../../css/sidebar.css">

    <link rel="stylesheet"
          href="../../css/cards.css">

    <link rel="stylesheet"
          href="../../css/buttons.css">

    <link rel="stylesheet"
          href="../../css/forms.css">

    <link rel="stylesheet"
          href="../../css/responsive.css">

    <link rel="stylesheet"
          href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="study-material-page">

        <!-- Page Header -->

        <section class="page-header">

            <div class="container">

                <h1>

                    Study Material

                </h1>

                <p>

                    Access notes, PDFs, assignments and study resources.

                </p>

            </div>

        </section>

        <!-- Search -->

        <section class="material-search">

            <div class="container">

                <input type="search"
                       id="studyMaterialSearch"
                       placeholder="Search study materials...">

            </div>

        </section>

        <!-- Semester -->

        <section class="semester-list">

            <div class="container">

                <div id="semesterContainer">

                </div>

            </div>

        </section>

        <!-- Subjects -->

        <section class="subject-list">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Subjects

                    </h2>

                </div>

                <div id="subjectContainer">

                </div>

            </div>

        </section>

        <!-- Study Materials -->

        <section class="material-list">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Available Study Materials

                    </h2>

                </div>

                <div id="studyMaterialContainer">

                </div>

            </div>

        </section>

        <!-- Recently Added -->

        <section class="recent-materials">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Recently Added

                    </h2>

                </div>

                <div id="recentMaterialContainer">

                </div>

            </div>

        </section>

        <!-- Downloads -->

        <section class="material-downloads">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Downloaded Materials

                    </h2>

                </div>

                <div id="downloadedMaterialContainer">

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/search.js"></script>
    <script src="../../js/study-material.js"></script>
    <script src="../../js/app.js"></script>

</body>

</html>
