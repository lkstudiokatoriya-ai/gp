<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Forgot Password | Polytechnic Hub</title>

    <meta name="description"
          content="Reset your Polytechnic Hub account password">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../css/reset.css">

    <link rel="stylesheet"
          href="../../css/variables.css">

    <link rel="stylesheet"
          href="../../css/typography.css">

    <link rel="stylesheet"
          href="../../css/layout.css">

    <link rel="stylesheet"
          href="../../css/forms.css">

    <link rel="stylesheet"
          href="../../css/buttons.css">

    <link rel="stylesheet"
          href="../../css/responsive.css">

    <link rel="stylesheet"
          href="../../css/style.css">

</head>

<body>

    <!-- Header Component -->

    <header id="header-container"></header>

    <main id="forgot-password-page">

        <section class="forgot-password-section">

            <div class="forgot-password-container">

                <div class="forgot-password-logo">

                    <img src="../../assets/logo/logo.png"
                         alt="Polytechnic Hub">

                </div>

                <h1>

                    Forgot Password

                </h1>

                <p>

                    Enter your registered mobile number or email to receive a password reset OTP.

                </p>

                <form id="forgotPasswordForm">

                    <div class="form-group">

                        <label for="mobileOrEmail">

                            Mobile Number / Email

                        </label>

                        <input type="text"
                               id="mobileOrEmail"
                               name="mobileOrEmail"
                               placeholder="Enter Mobile Number or Email"
                               required>

                    </div>

                    <button type="button"
                            id="sendResetOtpButton">

                        Send Reset OTP

                    </button>

                </form>

                <div class="forgot-password-footer">

                    <p>

                        Remember your password?

                        <a href="login.html">

                            Login

                        </a>

                    </p>

                </div>

            </div>

        </section>

    </main>

    <!-- Footer Component -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>

    <script src="../../js/supabase.js"></script>

    <script src="../../js/auth.js"></script>

    <script src="../../js/app.js"></script>

</body>

</html>
