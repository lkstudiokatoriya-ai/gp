<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>OTP Verification | Polytechnic Hub</title>

    <meta name="description"
          content="Verify OTP to continue">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../css/reset.css">

    <link rel="stylesheet"
          href="../../css/variables.css">

    <link rel="stylesheet"
          href="../../css/typography.css">

    <link rel="stylesheet"
          href="../../css/layout.css">

    <link rel="stylesheet"
          href="../../css/forms.css">

    <link rel="stylesheet"
          href="../../css/buttons.css">

    <link rel="stylesheet"
          href="../../css/responsive.css">

    <link rel="stylesheet"
          href="../../css/style.css">

</head>

<body>

    <!-- Header Component -->

    <header id="header-container"></header>

    <main id="otp-page">

        <section class="otp-section">

            <div class="otp-container">

                <div class="otp-logo">

                    <img src="../../assets/logo/logo.png"
                         alt="Polytechnic Hub">

                </div>

                <h1>

                    OTP Verification

                </h1>

                <p>

                    Enter the 6-digit OTP sent to your registered mobile number.

                </p>

                <form id="otpForm">

                    <div class="form-group">

                        <label for="otp">

                            Enter OTP

                        </label>

                        <input type="text"
                               id="otp"
                               name="otp"
                               maxlength="6"
                               inputmode="numeric"
                               autocomplete="one-time-code"
                               placeholder="Enter 6-digit OTP"
                               required>

                    </div>

                    <button type="button"
                            id="verifyOtpButton">

                        Verify OTP

                    </button>

                    <button type="button"
                            id="resendOtpButton">

                        Resend OTP

                    </button>

                </form>

                <div class="otp-footer">

                    <p>

                        Wrong Mobile Number?

                        <a href="login.html">

                            Change Number

                        </a>

                    </p>

                </div>

            </div>

        </section>

    </main>

    <!-- Footer Component -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>

    <script src="../../js/supabase.js"></script>

    <script src="../../js/auth.js"></script>

    <script src="../../js/app.js"></script>

</body>

</html>
