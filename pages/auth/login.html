<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | Polytechnic Hub</title>

    <meta name="description"
          content="Login to Polytechnic Hub">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../css/reset.css">

    <link rel="stylesheet"
          href="../../css/variables.css">

    <link rel="stylesheet"
          href="../../css/typography.css">

    <link rel="stylesheet"
          href="../../css/layout.css">

    <link rel="stylesheet"
          href="../../css/forms.css">

    <link rel="stylesheet"
          href="../../css/buttons.css">

    <link rel="stylesheet"
          href="../../css/responsive.css">

    <link rel="stylesheet"
          href="../../css/style.css">

</head>

<body>

    <!-- Header Component -->

    <header id="header-container"></header>

    <main id="login-page">

        <section class="login-section">

            <div class="login-container">

                <div class="login-logo">

                    <img src="../../assets/logo/logo.png"
                         alt="Polytechnic Hub Logo">

                </div>

                <h1>

                    Welcome Back

                </h1>

                <p>

                    Login with your mobile number

                </p>

                <form id="loginForm">

                    <div class="form-group">

                        <label for="mobileNumber">

                            Mobile Number

                        </label>

                        <input type="tel"
                               id="mobileNumber"
                               name="mobileNumber"
                               maxlength="10"
                               placeholder="Enter Mobile Number"
                               autocomplete="tel"
                               required>

                    </div>

                    <button type="button"
                            id="sendOtpButton">

                        Send OTP

                    </button>

                    <div class="form-group">

                        <label for="otp">

                            OTP

                        </label>

                        <input type="text"
                               id="otp"
                               name="otp"
                               maxlength="6"
                               placeholder="Enter OTP">

                    </div>

                    <button type="button"
                            id="verifyOtpButton">

                        Verify OTP

                    </button>

                    <button type="button"
                            id="resendOtpButton">

                        Resend OTP

                    </button>

                </form>

                <div class="login-footer">

                    <p>

                        Don't have an account?

                        <a href="register.html">

                            Register

                        </a>

                    </p>

                </div>

            </div>

        </section>

    </main>

    <!-- Footer Component -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>

    <script src="../../js/supabase.js"></script>

    <script src="../../js/auth.js"></script>

    <script src="../../js/app.js"></script>

</body>

                  </html>
