<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Account Verification | Polytechnic Hub</title>

    <meta name="description"
          content="Verify your Polytechnic Hub account">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../css/reset.css">

    <link rel="stylesheet"
          href="../../css/variables.css">

    <link rel="stylesheet"
          href="../../css/typography.css">

    <link rel="stylesheet"
          href="../../css/layout.css">

    <link rel="stylesheet"
          href="../../css/forms.css">

    <link rel="stylesheet"
          href="../../css/buttons.css">

    <link rel="stylesheet"
          href="../../css/responsive.css">

    <link rel="stylesheet"
          href="../../css/style.css">

</head>

<body>

    <!-- Header Component -->

    <header id="header-container"></header>

    <main id="verify-page">

        <section class="verify-section">

            <div class="verify-container">

                <div class="verify-logo">

                    <img src="../../assets/logo/logo.png"
                         alt="Polytechnic Hub">

                </div>

                <h1>

                    Verify Your Account

                </h1>

                <p>

                    Please verify your account to continue.

                </p>

                <form id="verifyForm">

                    <div class="form-group">

                        <label for="verificationCode">

                            Verification Code

                        </label>

                        <input type="text"
                               id="verificationCode"
                               name="verificationCode"
                               maxlength="6"
                               inputmode="numeric"
                               placeholder="Enter Verification Code"
                               required>

                    </div>

                    <button type="button"
                            id="verifyAccountButton">

                        Verify Account

                    </button>

                    <button type="button"
                            id="resendVerificationButton">

                        Resend Code

                    </button>

                </form>

                <div class="verify-footer">

                    <p>

                        Wrong mobile number?

                        <a href="register.html">

                            Register Again

                        </a>

                    </p>

                    <p>

                        Already verified?

                        <a href="login.html">

                            Login

                        </a>

                    </p>

                </div>

            </div>

        </section>

    </main>

    <!-- Footer Component -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>

    <script src="../../js/supabase.js"></script>

    <script src="../../js/auth.js"></script>

    <script src="../../js/app.js"></script>

</body>

  </html>
