<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Notification Settings | Polytechnic Hub</title>

    <meta name="description"
          content="Manage notification preferences for Polytechnic Hub">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/typography.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/header.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/cards.css">
    <link rel="stylesheet" href="../../css/buttons.css">
    <link rel="stylesheet" href="../../css/forms.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <link rel="stylesheet" href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="notification-settings-page">

        <!-- Page Header -->

        <section class="page-header">

            <div class="container">

                <h1>

                    Notification Settings

                </h1>

                <p>

                    Choose which notifications you want to receive.

                </p>

            </div>

        </section>

        <!-- Notification Settings -->

        <section class="notification-section">

            <div class="container">

                <div class="settings-list">

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="pushNotification" checked>
                            Push Notifications
                        </label>
                    </div>

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="courseNotification" checked>
                            Course Updates
                        </label>
                    </div>

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="liveClassNotification" checked>
                            Live Class Alerts
                        </label>
                    </div>

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="testNotification" checked>
                            Test Notifications
                        </label>
                    </div>

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="resultNotification" checked>
                            Result Notifications
                        </label>
                    </div>

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="noticeNotification" checked>
                            Notice Board Updates
                        </label>
                    </div>

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="downloadNotification">
                            Download Completed
                        </label>
                    </div>

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="communityNotification">
                            Community Replies
                        </label>
                    </div>

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="paymentNotification" checked>
                            Payment Updates
                        </label>
                    </div>

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="marketingNotification">
                            Offers & Promotions
                        </label>
                    </div>

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="emailNotification">
                            Email Notifications
                        </label>
                    </div>

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="smsNotification">
                            SMS Notifications
                        </label>
                    </div>

                </div>

                <button id="saveNotificationSettings">

                    Save Settings

                </button>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/notifications.js"></script>
    <script src="../../js/app.js"></script>

</body>

</html>
