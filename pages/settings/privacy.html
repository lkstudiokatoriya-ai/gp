<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Privacy Settings | Polytechnic Hub</title>

    <meta name="description"
          content="Manage your privacy settings on Polytechnic Hub">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/typography.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/header.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/cards.css">
    <link rel="stylesheet" href="../../css/buttons.css">
    <link rel="stylesheet" href="../../css/forms.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <link rel="stylesheet" href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="privacy-page">

        <!-- Page Header -->

        <section class="page-header">

            <div class="container">

                <h1>

                    Privacy Settings

                </h1>

                <p>

                    Control your account privacy and data preferences.

                </p>

            </div>

        </section>

        <!-- Privacy Options -->

        <section class="privacy-section">

            <div class="container">

                <div class="settings-list">

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="profileVisibility">
                            Public Profile
                        </label>
                    </div>

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="showEmail">
                            Show Email Address
                        </label>
                    </div>

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="showMobile">
                            Show Mobile Number
                        </label>
                    </div>

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="showCertificates">
                            Show Certificates Publicly
                        </label>
                    </div>

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="showProgress">
                            Share Study Progress
                        </label>
                    </div>

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="allowMessages">
                            Allow Community Messages
                        </label>
                    </div>

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="allowNotifications" checked>
                            Receive Notifications
                        </label>
                    </div>

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="allowAnalytics" checked>
                            Improve App Experience
                        </label>
                    </div>

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="rememberLogin" checked>
                            Keep Me Logged In
                        </label>
                    </div>

                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="personalizedContent" checked>
                            Personalized Recommendations
                        </label>
                    </div>

                </div>

                <button id="savePrivacySettings">

                    Save Changes

                </button>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/privacy.js"></script>
    <script src="../../js/app.js"></script>

</body>

</html>
