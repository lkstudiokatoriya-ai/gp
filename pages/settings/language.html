<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Language Settings | Polytechnic Hub</title>

    <meta name="description"
          content="Choose your preferred language for Polytechnic Hub">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/typography.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/header.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/cards.css">
    <link rel="stylesheet" href="../../css/buttons.css">
    <link rel="stylesheet" href="../../css/forms.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <link rel="stylesheet" href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="language-page">

        <!-- Page Header -->

        <section class="page-header">

            <div class="container">

                <h1>

                    Language Settings

                </h1>

                <p>

                    Select your preferred application language.

                </p>

            </div>

        </section>

        <!-- Language Selection -->

        <section class="language-section">

            <div class="container">

                <form id="languageForm">

                    <div class="setting-item">

                        <label>

                            <input type="radio"
                                   name="language"
                                   value="en"
                                   checked>

                            🇺🇸 English

                        </label>

                    </div>

                    <div class="setting-item">

                        <label>

                            <input type="radio"
                                   name="language"
                                   value="hi">

                            🇮🇳 हिन्दी (Hindi)

                        </label>

                    </div>

                    <div class="setting-item">

                        <label>

                            <input type="radio"
                                   name="language"
                                   value="bn">

                            🇮🇳 বাংলা (Bengali)

                        </label>

                    </div>

                    <div class="setting-item">

                        <label>

                            <input type="radio"
                                   name="language"
                                   value="mr">

                            🇮🇳 मराठी (Marathi)

                        </label>

                    </div>

                    <div class="setting-item">

                        <label>

                            <input type="radio"
                                   name="language"
                                   value="ta">

                            🇮🇳 தமிழ் (Tamil)

                        </label>

                    </div>

                    <div class="setting-item">

                        <label>

                            <input type="radio"
                                   name="language"
                                   value="te">

                            🇮🇳 తెలుగు (Telugu)

                        </label>

                    </div>

                    <div class="setting-item">

                        <label>

                            <input type="radio"
                                   name="language"
                                   value="kn">

                            🇮🇳 ಕನ್ನಡ (Kannada)

                        </label>

                    </div>

                    <div class="setting-item">

                        <label>

                            <input type="radio"
                                   name="language"
                                   value="ml">

                            🇮🇳 മലയാളം (Malayalam)

                        </label>

                    </div>

                    <div class="setting-item">

                        <label>

                            <input type="radio"
                                   name="language"
                                   value="gu">

                            🇮🇳 ગુજરાતી (Gujarati)

                        </label>

                    </div>

                    <div class="setting-item">

                        <label>

                            <input type="radio"
                                   name="language"
                                   value="pa">

                            🇮🇳 ਪੰਜਾਬੀ (Punjabi)

                        </label>

                    </div>

                    <button type="submit"
                            id="saveLanguageButton">

                        Save Language

                    </button>

                </form>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/language.js"></script>
    <script src="../../js/app.js"></script>

</body>

</html>
