<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit Profile | Polytechnic Hub</title>

    <meta name="description"
          content="Edit Student Profile - Polytechnic Hub">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../css/reset.css">

    <link rel="stylesheet"
          href="../../css/variables.css">

    <link rel="stylesheet"
          href="../../css/typography.css">

    <link rel="stylesheet"
          href="../../css/layout.css">

    <link rel="stylesheet"
          href="../../css/header.css">

    <link rel="stylesheet"
          href="../../css/sidebar.css">

    <link rel="stylesheet"
          href="../../css/forms.css">

    <link rel="stylesheet"
          href="../../css/buttons.css">

    <link rel="stylesheet"
          href="../../css/cards.css">

    <link rel="stylesheet"
          href="../../css/responsive.css">

    <link rel="stylesheet"
          href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="edit-profile-page">

        <section class="edit-profile-section">

            <div class="container">

                <div class="edit-profile-card">

                    <h1>

                        Edit Profile

                    </h1>

                    <form id="editProfileForm">

                        <div class="profile-photo">

                            <img src="../../assets/images/default-user.png"
                                 alt="Profile Photo"
                                 id="profilePreview">

                            <input type="file"
                                   id="profileImage"
                                   accept="image/*">

                        </div>

                        <div class="form-group">

                            <label for="studentName">

                                Full Name

                            </label>

                            <input type="text"
                                   id="studentName"
                                   name="studentName"
                                   required>

                        </div>

                        <div class="form-group">

                            <label for="mobileNumber">

                                Mobile Number

                            </label>

                            <input type="tel"
                                   id="mobileNumber"
                                   name="mobileNumber"
                                   readonly>

                        </div>

                        <div class="form-group">

                            <label for="email">

                                Email

                            </label>

                            <input type="email"
                                   id="email"
                                   name="email">

                        </div>

                        <div class="form-group">

                            <label for="branch">

                                Branch

                            </label>

                            <select id="branch"
                                    name="branch">

                                <option>Electrical Engineering</option>

                                <option>Mechanical Engineering</option>

                                <option>Civil Engineering</option>

                                <option>Computer Engineering</option>

                                <option>Electronics Engineering</option>

                            </select>

                        </div>

                        <div class="form-group">

                            <label for="semester">

                                Semester

                            </label>

                            <select id="semester"
                                    name="semester">

                                <option>1st Semester</option>
                                <option>2nd Semester</option>
                                <option>3rd Semester</option>
                                <option>4th Semester</option>
                                <option>5th Semester</option>
                                <option>6th Semester</option>

                            </select>

                        </div>

                        <div class="form-group">

                            <label for="college">

                                College Name

                            </label>

                            <input type="text"
                                   id="college"
                                   name="college">

                        </div>

                        <div class="form-group">

                            <label for="address">

                                Address

                            </label>

                            <textarea id="address"
                                      name="address"
                                      rows="3"></textarea>

                        </div>

                        <button type="submit"
                                id="saveProfileButton">

                            Save Changes

                        </button>

                        <button type="reset"
                                id="cancelButton">

                            Cancel

                        </button>

                    </form>

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/profile.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/app.js"></script>

</body>

                              </html>
