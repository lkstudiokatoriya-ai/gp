<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Study Progress | Polytechnic Hub</title>

    <meta name="description"
          content="Track your learning progress on Polytechnic Hub">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../css/reset.css">

    <link rel="stylesheet"
          href="../../css/variables.css">

    <link rel="stylesheet"
          href="../../css/typography.css">

    <link rel="stylesheet"
          href="../../css/layout.css">

    <link rel="stylesheet"
          href="../../css/header.css">

    <link rel="stylesheet"
          href="../../css/sidebar.css">

    <link rel="stylesheet"
          href="../../css/cards.css">

    <link rel="stylesheet"
          href="../../css/buttons.css">

    <link rel="stylesheet"
          href="../../css/responsive.css">

    <link rel="stylesheet"
          href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="progress-page">

        <section class="page-header">

            <div class="container">

                <h1>

                    Study Progress

                </h1>

                <p>

                    Track your learning journey and achievements.

                </p>

            </div>

        </section>

        <!-- Progress Overview -->

        <section class="progress-overview">

            <div class="container">

                <div class="summary-card">

                    <div class="summary-item">

                        <h3 id="overallProgress">

                            0%

                        </h3>

                        <p>

                            Overall Progress

                        </p>

                    </div>

                    <div class="summary-item">

                        <h3 id="coursesCompleted">

                            0

                        </h3>

                        <p>

                            Courses Completed

                        </p>

                    </div>

                    <div class="summary-item">

                        <h3 id="testsCompleted">

                            0

                        </h3>

                        <p>

                            Tests Completed

                        </p>

                    </div>

                    <div class="summary-item">

                        <h3 id="studyHours">

                            0

                        </h3>

                        <p>

                            Study Hours

                        </p>

                    </div>

                </div>

            </div>

        </section>

        <!-- Current Courses -->

        <section class="current-progress">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Current Course Progress

                    </h2>

                </div>

                <div id="courseProgressContainer">

                </div>

            </div>

        </section>

        <!-- Test Performance -->

        <section class="test-performance">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Test Performance

                    </h2>

                </div>

                <div id="testPerformanceContainer">

                </div>

            </div>

        </section>

        <!-- Achievements -->

        <section class="achievements">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Achievements

                    </h2>

                </div>

                <div id="achievementContainer">

                </div>

            </div>

        </section>

        <!-- Learning History -->

        <section class="learning-history">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Learning History

                    </h2>

                </div>

                <div id="historyContainer">

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/profile.js"></script>
    <script src="../../js/analytics.js"></script>
    <script src="../../js/app.js"></script>

</body>

</html>
