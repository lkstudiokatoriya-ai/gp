<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Bookmarks | Polytechnic Hub</title>

    <meta name="description"
          content="Your Saved Bookmarks - Polytechnic Hub">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../css/reset.css">

    <link rel="stylesheet"
          href="../../css/variables.css">

    <link rel="stylesheet"
          href="../../css/typography.css">

    <link rel="stylesheet"
          href="../../css/layout.css">

    <link rel="stylesheet"
          href="../../css/header.css">

    <link rel="stylesheet"
          href="../../css/sidebar.css">

    <link rel="stylesheet"
          href="../../css/cards.css">

    <link rel="stylesheet"
          href="../../css/buttons.css">

    <link rel="stylesheet"
          href="../../css/responsive.css">

    <link rel="stylesheet"
          href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="bookmarks-page">

        <section class="page-header">

            <div class="container">

                <h1>

                    My Bookmarks

                </h1>

                <p>

                    View all your saved courses, notes, videos and study materials.

                </p>

            </div>

        </section>

        <!-- Bookmark Summary -->

        <section class="bookmark-summary">

            <div class="container">

                <div class="summary-card">

                    <div class="summary-item">

                        <h3 id="totalBookmarks">

                            0

                        </h3>

                        <p>

                            Total Bookmarks

                        </p>

                    </div>

                    <div class="summary-item">

                        <h3 id="savedCourses">

                            0

                        </h3>

                        <p>

                            Courses

                        </p>

                    </div>

                    <div class="summary-item">

                        <h3 id="savedNotes">

                            0

                        </h3>

                        <p>

                            Notes

                        </p>

                    </div>

                    <div class="summary-item">

                        <h3 id="savedVideos">

                            0

                        </h3>

                        <p>

                            Videos

                        </p>

                    </div>

                </div>

            </div>

        </section>

        <!-- Bookmarked Courses -->

        <section class="bookmarked-courses">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Saved Courses

                    </h2>

                </div>

                <div id="bookmarkedCoursesContainer">

                </div>

            </div>

        </section>

        <!-- Bookmarked Notes -->

        <section class="bookmarked-notes">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Saved Notes

                    </h2>

                </div>

                <div id="bookmarkedNotesContainer">

                </div>

            </div>

        </section>

        <!-- Bookmarked Videos -->

        <section class="bookmarked-videos">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Saved Videos

                    </h2>

                </div>

                <div id="bookmarkedVideosContainer">

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/bookmarks.js"></script>
    <script src="../../js/profile.js"></script>
    <script src="../../js/app.js"></script>

</body>

</html>
