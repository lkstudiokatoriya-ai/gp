<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Downloads | Polytechnic Hub</title>

    <meta name="description"
          content="Downloaded PDFs and Videos - Polytechnic Hub">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../css/reset.css">

    <link rel="stylesheet"
          href="../../css/variables.css">

    <link rel="stylesheet"
          href="../../css/typography.css">

    <link rel="stylesheet"
          href="../../css/layout.css">

    <link rel="stylesheet"
          href="../../css/header.css">

    <link rel="stylesheet"
          href="../../css/sidebar.css">

    <link rel="stylesheet"
          href="../../css/cards.css">

    <link rel="stylesheet"
          href="../../css/buttons.css">

    <link rel="stylesheet"
          href="../../css/responsive.css">

    <link rel="stylesheet"
          href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="downloads-page">

        <section class="page-header">

            <div class="container">

                <h1>

                    Downloads

                </h1>

                <p>

                    Access your downloaded PDFs, Videos and Study Materials.

                </p>

            </div>

        </section>

        <!-- Download Summary -->

        <section class="download-summary">

            <div class="container">

                <div class="summary-card">

                    <div class="summary-item">

                        <h3 id="totalDownloads">

                            0

                        </h3>

                        <p>

                            Total Downloads

                        </p>

                    </div>

                    <div class="summary-item">

                        <h3 id="pdfDownloads">

                            0

                        </h3>

                        <p>

                            PDF Files

                        </p>

                    </div>

                    <div class="summary-item">

                        <h3 id="videoDownloads">

                            0

                        </h3>

                        <p>

                            Videos

                        </p>

                    </div>

                </div>

            </div>

        </section>

        <!-- PDF Downloads -->

        <section class="pdf-downloads">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Downloaded PDFs

                    </h2>

                </div>

                <div id="pdfDownloadContainer">

                </div>

            </div>

        </section>

        <!-- Video Downloads -->

        <section class="video-downloads">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Downloaded Videos

                    </h2>

                </div>

                <div id="videoDownloadContainer">

                </div>

            </div>

        </section>

        <!-- Offline Files -->

        <section class="offline-files">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Offline Study Materials

                    </h2>

                </div>

                <div id="offlineMaterialContainer">

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/downloads.js"></script>
    <script src="../../js/profile.js"></script>
    <script src="../../js/app.js"></script>

</body>

</html>
