<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Profile | Polytechnic Hub</title>

    <meta name="description"
          content="Student Profile - Polytechnic Hub">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../css/reset.css">

    <link rel="stylesheet"
          href="../../css/variables.css">

    <link rel="stylesheet"
          href="../../css/typography.css">

    <link rel="stylesheet"
          href="../../css/layout.css">

    <link rel="stylesheet"
          href="../../css/header.css">

    <link rel="stylesheet"
          href="../../css/sidebar.css">

    <link rel="stylesheet"
          href="../../css/forms.css">

    <link rel="stylesheet"
          href="../../css/buttons.css">

    <link rel="stylesheet"
          href="../../css/cards.css">

    <link rel="stylesheet"
          href="../../css/responsive.css">

    <link rel="stylesheet"
          href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="profile-page">

        <section class="profile-section">

            <div class="container">

                <div class="profile-card">

                    <div class="profile-image">

                        <img src="../../assets/images/default-user.png"
                             alt="Student Profile"
                             id="profilePhoto">

                    </div>

                    <div class="profile-info">

                        <h2 id="studentName">

                            Student Name

                        </h2>

                        <p id="studentId">

                            Student ID

                        </p>

                    </div>

                </div>

            </div>

        </section>

        <section class="profile-details">

            <div class="container">

                <div class="details-card">

                    <h3>

                        Personal Information

                    </h3>

                    <table>

                        <tr>
                            <th>Full Name</th>
                            <td id="fullName"></td>
                        </tr>

                        <tr>
                            <th>Mobile</th>
                            <td id="mobileNumber"></td>
                        </tr>

                        <tr>
                            <th>Email</th>
                            <td id="email"></td>
                        </tr>

                        <tr>
                            <th>Branch</th>
                            <td id="branch"></td>
                        </tr>

                        <tr>
                            <th>Semester</th>
                            <td id="semester"></td>
                        </tr>

                        <tr>
                            <th>College</th>
                            <td id="college"></td>
                        </tr>

                        <tr>
                            <th>Registration Date</th>
                            <td id="registrationDate"></td>
                        </tr>

                    </table>

                </div>

            </div>

        </section>

        <section class="profile-actions">

            <div class="container">

                <button id="editProfileButton">

                    Edit Profile

                </button>

                <button id="changePasswordButton">

                    Change Password

                </button>

                <button id="logoutButton">

                    Logout

                </button>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/profile.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/app.js"></script>

</body>

  </html>
