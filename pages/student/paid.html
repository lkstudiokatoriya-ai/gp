<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Paid Courses | Polytechnic Hub</title>

    <meta name="description"
          content="Explore premium paid courses on Polytechnic Hub">

    <link rel="manifest"
          href="../../manifest.json">

    <link rel="icon"
          href="../../assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../../css/reset.css">

    <link rel="stylesheet"
          href="../../css/variables.css">

    <link rel="stylesheet"
          href="../../css/typography.css">

    <link rel="stylesheet"
          href="../../css/layout.css">

    <link rel="stylesheet"
          href="../../css/header.css">

    <link rel="stylesheet"
          href="../../css/sidebar.css">

    <link rel="stylesheet"
          href="../../css/cards.css">

    <link rel="stylesheet"
          href="../../css/buttons.css">

    <link rel="stylesheet"
          href="../../css/banner.css">

    <link rel="stylesheet"
          href="../../css/responsive.css">

    <link rel="stylesheet"
          href="../../css/style.css">

</head>

<body>

    <!-- Header -->

    <header id="header-container"></header>

    <!-- Sidebar -->

    <aside id="sidebar-container"></aside>

    <main id="paid-courses-page">

        <section class="page-header">

            <div class="container">

                <h1>

                    Paid Courses

                </h1>

                <p>

                    Purchase premium courses with complete notes, videos, tests and certificates.

                </p>

            </div>

        </section>

        <!-- Search -->

        <section class="course-search">

            <div class="container">

                <input type="search"
                       id="courseSearch"
                       placeholder="Search courses...">

            </div>

        </section>

        <!-- Categories -->

        <section class="course-categories">

            <div class="container">

                <div id="categoryContainer">

                </div>

            </div>

        </section>

        <!-- Featured Courses -->

        <section class="featured-courses">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Featured Courses

                    </h2>

                </div>

                <div id="featuredCourseContainer">

                </div>

            </div>

        </section>

        <!-- All Paid Courses -->

        <section class="all-paid-courses">

            <div class="container">

                <div class="section-title">

                    <h2>

                        All Paid Courses

                    </h2>

                </div>

                <div id="paidCourseContainer">

                </div>

            </div>

        </section>

        <!-- Popular Courses -->

        <section class="popular-courses">

            <div class="container">

                <div class="section-title">

                    <h2>

                        Most Popular

                    </h2>

                </div>

                <div id="popularCourseContainer">

                </div>

            </div>

        </section>

    </main>

    <!-- Bottom Navigation -->

    <nav id="bottom-nav-container"></nav>

    <!-- Footer -->

    <footer id="footer-container"></footer>

    <script src="../../js/component-loader.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/courses.js"></script>
    <script src="../../js/search.js"></script>
    <script src="../../js/app.js"></script>

</body>

  </html>
