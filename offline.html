<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Offline | Polytechnic Hub</title>

    <meta name="description"
          content="You are currently offline. Please check your internet connection.">

    <meta name="theme-color"
          content="#1565C0">

    <link rel="manifest"
          href="manifest.json">

    <link rel="icon"
          href="assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="css/reset.css">

    <link rel="stylesheet"
          href="css/variables.css">

    <link rel="stylesheet"
          href="css/typography.css">

    <link rel="stylesheet"
          href="css/layout.css">

    <link rel="stylesheet"
          href="css/buttons.css">

    <link rel="stylesheet"
          href="css/responsive.css">

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <main id="offline-page">

        <section class="offline-container">

            <div class="offline-content">

                <img src="assets/logo/logo.png"
                     alt="Polytechnic Hub Logo"
                     class="offline-logo">

                <h1>

                    You're Offline

                </h1>

                <p>

                    It looks like your internet connection is unavailable.

                </p>

                <p>

                    Please reconnect to the internet and try again.

                </p>

                <button id="retryButton">

                    Retry

                </button>

                <a href="index.html"
                   id="homeButton">

                    Go to Home

                </a>

            </div>

        </section>

    </main>

    <script src="js/app.js"></script>

</body>

</html>
