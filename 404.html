<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>404 | Page Not Found | Polytechnic Hub</title>

    <meta name="description"
          content="The page you are looking for could not be found.">

    <meta name="theme-color"
          content="#1565C0">

    <link rel="manifest"
          href="manifest.json">

    <link rel="icon"
          href="assets/logo/logo.png">

    <!-- CSS -->

    <link rel="stylesheet"
          href="css/reset.css">

    <link rel="stylesheet"
          href="css/variables.css">

    <link rel="stylesheet"
          href="css/typography.css">

    <link rel="stylesheet"
          href="css/layout.css">

    <link rel="stylesheet"
          href="css/buttons.css">

    <link rel="stylesheet"
          href="css/responsive.css">

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <main id="error-page">

        <section class="error-container">

            <div class="error-content">

                <img src="assets/logo/logo.png"
                     alt="Polytechnic Hub Logo"
                     class="error-logo">

                <h1>

                    404

                </h1>

                <h2>

                    Page Not Found

                </h2>

                <p>

                    Sorry, the page you are looking for doesn't exist or has been moved.

                </p>

                <div class="error-actions">

                    <a href="index.html"
                       id="homeButton">

                        Go to Home

                    </a>

                    <button id="backButton">

                        Go Back

                    </button>

                </div>

            </div>

        </section>

    </main>

    <script src="js/app.js"></script>

</body>

</html>
